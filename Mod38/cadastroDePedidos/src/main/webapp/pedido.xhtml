<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Cadastro de Pedido</title>
</h:head>

<h:body>

    <h:form>

        <h2>Cadastrar Pedido</h2>

        <h:messages style="color:red" />

        <!-- FORMULÁRIO -->
        <h:panelGrid columns="2" cellpadding="5">

            <h:outputLabel value="Data:" />
            <h:inputText value="#{pedidoBean.pedido.data}">
                <f:convertDateTime pattern="dd/MM/yyyy" />
            </h:inputText>

            <h:outputLabel value="Cliente:" />
            <h:selectOneMenu value="#{pedidoBean.pedido.cliente}" converter="clienteConverter">
                <f:selectItem itemLabel="Selecione" itemValue="#{null}" />
                <f:selectItems value="#{pedidoBean.clientes}"
                               var="c"
                               itemValue="#{c}"
                               itemLabel="#{c.nome}" />
            </h:selectOneMenu>

            <h:outputLabel value="Produto:" />
            <h:selectOneMenu value="#{pedidoBean.pedido.produto}" converter="produtoConverter">
                <f:selectItem itemLabel="Selecione" itemValue="#{null}" />
                <f:selectItems value="#{pedidoBean.produtos}"
                               var="p"
                               itemValue="#{p}"
                               itemLabel="#{p.nome}" />
            </h:selectOneMenu>

        </h:panelGrid>

        <br/>

        <!-- BOTÃO PRINCIPAL -->
        <h:commandButton value="Salvar Pedido" action="#{pedidoBean.salvar}" />

        <br/><br/>

        <!-- NAVEGAÇÃO -->
        <h:panelGroup>
            <h3>Gerenciamento</h3>

            <h:link value="Clientes" outcome="cliente.xhtml" />
            |
            <h:link value="Produtos" outcome="produto.xhtml" />
            |
            <h:link value="Lista de Pedidos" outcome="listaPedidos.xhtml" />
        </h:panelGroup>

    </h:form>

</h:body>
</html>
