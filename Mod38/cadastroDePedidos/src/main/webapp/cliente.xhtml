<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Clientes</title>
</h:head>

<h:body>

    <h:form>
        <h2>Cadastrar Cliente</h2>

        Nome:
        <h:inputText value="#{clienteBean.cliente.nome}" />

        <br/>

        CPF:
        <h:inputText value="#{clienteBean.cliente.cpf}" />

        <br/>

        Endereço:
        <h:inputText value="#{clienteBean.cliente.endereco}" />

        <br/>

        Telefone:
        <h:inputText value="#{clienteBean.cliente.telefone}" />

        <br/><br/>

        <h:commandButton value="Salvar" action="#{clienteBean.salvar}" />

    </h:form>

    <br/><br/>

    <h2>Lista de Clientes</h2>

    <h:dataTable value="#{clienteBean.clientes}" var="c" border="1">

        <h:column>
            <f:facet name="header">Nome</f:facet>
            #{c.nome}
        </h:column>

        <h:column>
            <f:facet name="header">CPF</f:facet>
            #{c.cpf}
        </h:column>

        <h:column>
            <f:facet name="header">Endereço</f:facet>
            #{c.endereco}
        </h:column>

        <h:column>
            <f:facet name="header">Telefone</f:facet>
            #{c.telefone}
        </h:column>

        <!-- AÇÕES -->
        <h:column>
            <f:facet name="header">Ações</f:facet>

            <h:commandButton value="Editar"
                             action="#{clienteBean.editar(c)}">
                <f:ajax execute="@this" render="@form"/>
            </h:commandButton>

            <h:commandButton value="Excluir"
                             action="#{clienteBean.excluir(c)}"
                             onclick="return confirm('Deseja excluir?');" />
        </h:column>

    </h:dataTable>

</h:body>
</html>
