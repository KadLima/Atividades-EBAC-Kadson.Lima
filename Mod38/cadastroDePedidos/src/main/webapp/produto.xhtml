<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

<h:head>
    <title>Produtos</title>
</h:head>

<h:body>

    <h:form>
        <h2>Cadastrar Produto</h2>

        Nome:
        <h:inputText value="#{produtoBean.produto.nome}" />

        <br/>

        Preço:
        <h:inputText value="#{produtoBean.produto.preco}" />

        <br/><br/>

        <h:commandButton value="Salvar" action="#{produtoBean.salvar}" />
    </h:form>

    <br/><br/>

    <h2>Lista de Produtos</h2>

    <h:dataTable value="#{produtoBean.produtos}" var="p" border="1">

        <h:column>
            #{p.nome}
        </h:column>

        <h:column>
            #{p.preco}
        </h:column>

        <h:column>
            <h:commandButton value="Editar" action="#{produtoBean.editar(p)}" />
        </h:column>

    </h:dataTable>

</h:body>
</html>
