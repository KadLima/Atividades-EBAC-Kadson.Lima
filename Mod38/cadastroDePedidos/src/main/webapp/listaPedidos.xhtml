<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Lista de Pedidos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 80%;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        h2 {
            color: #2c3e50;
        }

        .btn-voltar {
            margin-top: 20px;
            display: inline-block;
            padding: 8px 15px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
        }
    </style>

</h:head>

<h:body>

    <h2>Lista de Pedidos</h2>

    <h:dataTable value="#{pedidoBean.pedidos}" var="p" border="1">

        <!-- CLIENTE -->
        <h:column>
            <f:facet name="header">Cliente</f:facet>
            <h:outputText value="#{p.nomeCliente}" />
        </h:column>

        <!-- PRODUTO -->
        <h:column>
            <f:facet name="header">Produto</f:facet>
            <h:outputText value="#{p.nomeProduto}" />
        </h:column>

        <!-- PREÇO -->
        <h:column>
            <f:facet name="header">Preço</f:facet>
            <h:outputText value="#{p.precoProduto}">
                <f:convertNumber type="currency" currencySymbol="R$" />
            </h:outputText>
        </h:column>

        <!-- DATA -->
        <h:column>
            <f:facet name="header">Data</f:facet>
            <h:outputText value="#{p.data}">
                <f:convertDateTime pattern="dd/MM/yyyy" />
            </h:outputText>
        </h:column>

    </h:dataTable>

    <br/>

    <!-- BOTÃO VOLTAR -->
    <h:link value="Voltar para Cadastro" outcome="pedido.xhtml" styleClass="btn-voltar" />

</h:body>
</html>
